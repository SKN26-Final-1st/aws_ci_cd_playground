name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ──────────────────────────────────────
  # 백엔드: backend/ 변경 감지 시 EB 배포
  # ──────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: backend 변경 여부 확인
        id: check
        run: |
          git fetch origin main --depth=2
          if git diff --name-only HEAD^ HEAD | grep -q '^backend/'; then
            echo "RUN=true" >> $GITHUB_OUTPUT
          else
            echo "RUN=false" >> $GITHUB_OUTPUT
          fi

      - name: Python 설정
        if: steps.check.outputs.RUN == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: EB CLI 설치
        if: steps.check.outputs.RUN == 'true'
        run: pip install awsebcli

      - name: AWS 자격증명 설정
        if: steps.check.outputs.RUN == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: EB 배포
        if: steps.check.outputs.RUN == 'true'
        working-directory: backend
        run: |
          eb init app_sample --region ap-northeast-2 --platform "Python 3.12"
          eb use app-sample-env
          eb deploy --staged

  # ──────────────────────────────────────
  # 프론트: frontend/ 변경 감지 시 S3 배포
  # ──────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: frontend 변경 여부 확인
        id: check
        run: |
          git fetch origin main --depth=2
          if git diff --name-only HEAD^ HEAD | grep -q '^frontend/'; then
            echo "RUN=true" >> $GITHUB_OUTPUT
          else
            echo "RUN=false" >> $GITHUB_OUTPUT
          fi

      - name: Node 설정
        if: steps.check.outputs.RUN == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 빌드
        if: steps.check.outputs.RUN == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: AWS 자격증명 설정
        if: steps.check.outputs.RUN == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: S3 업로드
        if: steps.check.outputs.RUN == 'true'
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_FRONTEND }} \
            --delete

      - name: CloudFront 캐시 무효화
        if: steps.check.outputs.RUN == 'true'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"